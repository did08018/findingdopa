    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f0f0f0;
      }

      /* ---------- NEURAL BACKGROUND ---------- */
      .neural-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .neural-bg svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .cell {
        opacity: 0.42;
        will-change: opacity, filter;
        animation: fire infinite ease-in-out;
        /* always-on soft halo — same color as the cell, very tight */
        filter: drop-shadow(0 0 1px currentColor);
      }
      /* line tiers — proximal (trunks) heavier, distal (forks/terminals) lighter */
      .cell path { fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
      .cell .trunk  { stroke-width: 1.2; }
      .cell .distal { stroke-width: 0.7; opacity: 0.85; }
      .cell ellipse { fill: currentColor; }

      /* Per-cell duration + delay so they don't sync */
      .cell.a { color: #EF9280; animation-duration: 12s; animation-delay:  0s;   }
      .cell.b { color: #F2A395; animation-duration: 15s; animation-delay: -4s;   }
      .cell.c { color: #E8826F; animation-duration: 14s; animation-delay: -8s;   }
      .cell.d { color: #EE9A85; animation-duration: 11s; animation-delay: -10.5s;}

      /* Multi-stage spike — lead-in, peak, dip, second smaller peak, decay.
         The stutter at 86%/87% is what makes it read as electric. */
      @keyframes fire {
        0%, 82% {
          opacity: 0.42;
          filter: drop-shadow(0 0 1px currentColor);
        }
        83% {
          opacity: 0.6;
          filter: drop-shadow(0 0 2px #FFAA90);
        }
        85% {
          opacity: 1;
          filter: drop-shadow(0 0 3px #FFE4DC)
                  drop-shadow(0 0 8px #FF8060)
                  drop-shadow(0 0 18px #FF6040);
        }
        86% {
          opacity: 0.72;
          filter: drop-shadow(0 0 2px #FFAA90)
                  drop-shadow(0 0 5px #FF8060);
        }
        87% {
          opacity: 0.93;
          filter: drop-shadow(0 0 2.5px #FFE4DC)
                  drop-shadow(0 0 6px #FF8060);
        }
        90% {
          opacity: 0.62;
          filter: drop-shadow(0 0 1.5px #FFAA90);
        }
        95% {
          opacity: 0.46;
          filter: drop-shadow(0 0 1px currentColor);
        }
        100% {
          opacity: 0.42;
          filter: drop-shadow(0 0 1px currentColor);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cell { animation: none; }
      }
      /* ---------- /NEURAL BACKGROUND ---------- */

      header,
      .page-wrapper {
        position: relative;
        z-index: 1;
      }

      .page-wrapper {
        display: flex;
        justify-content: center;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 3px;
        width: 320px;
        height: 83vh;
        padding: 0;
      }

      .box {
        border-radius: 10px;
        overflow: hidden;
        text-align: center;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 2px;
        box-sizing: border-box;
        text-decoration: none;
        font-size: 0.8em;
        background-clip: padding-box;
        position: relative;
      }
      .box img {
        height: auto;
        max-height: 50%;
        width: auto;
        object-fit: contain;
        display: none;
      }
      .box h2, .box p {
        position: relative;
        z-index: 1;
      }

      .box1 { background: #FAC46E url('coupling') no-repeat center; background-size: cover; grid-column: 1; grid-row: 1 / span 2; }
      .box5 { background: #BB93C8 url('dopavox') no-repeat center; background-size: cover; grid-column: 2 / span 2; grid-row: 1; }
      .box2 { background: #EF9280 url('aspis') no-repeat center; background-size: cover; grid-column: 2; grid-row: 2; }
      .box3 { background: #A7CB8C url('dopeaf') no-repeat center; background-size: cover; grid-column: 3; grid-row: 2; }
      .box4 { background: #ffbbd0 url('prisencolinensinainciusol') no-repeat center; background-size: cover; grid-column: 1 / span 2; grid-row: 3; }
      .box6 { background: #A8D5E2 url('legacy') no-repeat center; background-size: cover; grid-column: 3; grid-row: 3; }

      @media (min-width: 321px) {
        .container {
          width: 100%;
          max-width: 600px;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(3, 1fr);
          gap: 10px;
          padding: 10px;
        }
        .box { padding: 10px; }
        .box img, .box p { display: block; }
        .box h2 { font-size: 1.2em; }
        .box p { font-size: 0.9em; }
        .box1 { grid-column: 1; grid-row: 1 / span 2; }
        .box5 { grid-column: 2 / span 2; grid-row: 1; }
        .box2 { grid-column: 2; grid-row: 2; }
        .box3 { grid-column: 3; grid-row: 2; }
        .box4 { grid-column: 1 / span 2; grid-row: 3; }
        .box6 { grid-column: 3; grid-row: 3; }
      }

      header {
        background-color: transparent;
        width: 100%;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        padding: 10px 0 0 0;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
      }

      .home-brand {
        display: flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: #0084a2;
        font-size: 1.0rem;
        white-space: nowrap;
      }
      .home-brand i { font-size: 1.0rem; line-height: 1; }
      .logo-text {
        font-weight: 700;
        font-size: 1.0rem;
        color: #0084a2;
      }
    </style>
</head>

<body>

    <!-- ============ NEURAL BACKGROUND ============ -->
    <div class="neural-bg" aria-hidden="true">
      <svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">

        <!-- =========================================================
             Neuron A — small, ~upper-left. 3 simple dendrites,
             axon extending toward center with two terminal boutons.
             ========================================================= -->
        <g class="cell a">
          <path class="trunk" d="M 280 220 C 268 200 254 175 244 152"/>
          <path class="trunk" d="M 280 220 C 258 213 232 207 208 204"/>
          <path class="trunk" d="M 280 220 C 264 232 246 246 232 262"/>
          <path class="trunk"  d="M 280 220 C 320 232 365 240 410 244 C 448 248 478 258 502 270"/>
          <path class="distal" d="M 502 270 C 515 280 524 292 530 304"/>
          <path class="distal" d="M 502 270 C 518 268 530 274 540 282"/>
          <ellipse cx="280" cy="220" rx="6" ry="5.4"/>
        </g>

        <!-- =========================================================
             Neuron B — larger, ~upper-right. Multipolar; one dendrite
             forks. Long sinuous axon descending left toward center.
             ========================================================= -->
        <g class="cell b">
          <!-- main "up" dendrite + fork -->
          <path class="trunk"  d="M 920 270 C 922 244 918 212 912 182"/>
          <path class="distal" d="M 912 182 C 904 170 894 162 884 156"/>
          <path class="distal" d="M 912 182 C 922 168 932 158 944 152"/>
          <!-- side dendrites -->
          <path class="trunk" d="M 920 270 C 946 264 974 260 1000 258"/>
          <path class="trunk" d="M 920 270 C 944 285 970 296 992 304"/>
          <path class="trunk" d="M 920 270 C 898 283 876 296 858 308"/>
          <!-- axon descending and trailing inward -->
          <path class="trunk"  d="M 920 270 C 892 290 858 312 826 332 C 798 350 770 365 740 372"/>
          <path class="distal" d="M 740 372 C 725 380 712 390 702 400"/>
          <path class="distal" d="M 740 372 C 732 386 728 400 724 414"/>
          <path class="distal" d="M 740 372 C 722 374 706 372 692 368"/>
          <ellipse cx="920" cy="270" rx="7" ry="6.2"/>
        </g>

        <!-- =========================================================
             Neuron C — bipolar, ~lower-left. Two long graceful
             processes pointing in roughly opposite directions, plus
             a short axon.
             ========================================================= -->
        <g class="cell c">
          <!-- long dendrite going up-and-out, with a single fork -->
          <path class="trunk"  d="M 250 690 C 252 660 264 624 282 594 C 296 568 314 548 330 532"/>
          <path class="distal" d="M 330 532 C 342 522 358 516 372 514"/>
          <!-- long dendrite trailing left -->
          <path class="trunk"  d="M 250 690 C 222 682 192 674 162 670 C 138 668 116 672 100 680"/>
          <!-- short axon to the right -->
          <path class="trunk"  d="M 250 690 C 282 700 318 706 350 710"/>
          <path class="distal" d="M 350 710 C 365 705 380 710 390 720"/>
          <path class="distal" d="M 350 710 C 365 715 378 722 388 732"/>
          <ellipse cx="250" cy="690" rx="6" ry="5.6"/>
        </g>

        <!-- =========================================================
             Neuron D — pyramidal-style, ~lower-right. Single big
             apical dendrite going up (forked), short basal dendrites,
             axon descending.
             ========================================================= -->
        <g class="cell d">
          <!-- apical dendrite, long ascending + fork at top -->
          <path class="trunk"  d="M 950 640 C 952 612 948 580 944 548 C 940 522 944 498 956 478"/>
          <path class="distal" d="M 956 478 C 946 464 934 456 924 452"/>
          <path class="distal" d="M 956 478 C 968 464 980 456 990 452"/>
          <!-- basal dendrites -->
          <path class="trunk" d="M 950 640 C 928 650 908 664 894 680"/>
          <path class="trunk" d="M 950 640 C 970 652 988 668 1000 686"/>
          <!-- axon descending, with two terminal boutons -->
          <path class="trunk"  d="M 950 640 C 962 668 968 696 968 720 C 968 740 970 758 974 772"/>
          <path class="distal" d="M 974 772 C 968 786 962 796 956 802"/>
          <path class="distal" d="M 974 772 C 982 786 988 796 994 802"/>
          <ellipse cx="950" cy="640" rx="6.4" ry="5.8"/>
        </g>

      </svg>
    </div>
