<body>

    <canvas id="neural-bg" aria-hidden="true"></canvas>

          <p>Unexpectad Error</p>
        </a>
      </div>
    </div>

<script>
(() => {
  /* ============================================================
     NEURAL NETWORK BACKGROUND
     - Jittered grid of ~50 nodes in the 6 tile colors
     - Each node connects to its 2-3 nearest neighbors with a soft
       curved line
     - Continuous traffic of ~15-22 pulses traveling along edges
     - Pulses are bright with glow; destination nodes briefly flash
     ============================================================ */

  const canvas = document.getElementById('neural-bg');
  const ctx = canvas.getContext('2d');

  // The six tile colors — pulses cycle through these so the
  // background visibly belongs to the same family as the foreground
  const COLORS = ['#FAC46E', '#BB93C8', '#EF9280', '#A7CB8C', '#FFBBD0', '#A8D5E2'];

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let nodes = [];
  let edges = [];
  let pulses = [];
  let W = 0, H = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function generateNetwork() {
    nodes = [];
    edges = [];

    // Adaptive grid based on viewport size — denser on large screens,
    // sparser on small ones so it doesn't get crowded
    const COLS = Math.max(6, Math.floor(W / 160));
    const ROWS = Math.max(5, Math.floor(H / 160));

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        nodes.push({
          x: (c + 0.5) * (W / COLS) + (Math.random() - 0.5) * (W / COLS) * 0.5,
          y: (r + 0.5) * (H / ROWS) + (Math.random() - 0.5) * (H / ROWS) * 0.5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          flash: 0
        });
      }
    }

    // For each node, connect to 2-3 nearest neighbors. Use a Set keyed
    // on sorted-id-pairs so we never create duplicate edges (a→b and b→a)
    const edgeSet = new Set();
    nodes.forEach((n, i) => {
      const sorted = nodes
        .map((m, j) => ({ j, d: Math.hypot(n.x - m.x, n.y - m.y) }))
        .filter(o => o.j !== i)
        .sort((a, b) => a.d - b.d);

      const k = 2 + (Math.random() < 0.4 ? 1 : 0);
      for (let kk = 0; kk < k && kk < sorted.length; kk++) {
        const j = sorted[kk].j;
        const key = i < j ? `${i}-${j}` : `${j}-${i}`;
        if (edgeSet.has(key)) continue;
        edgeSet.add(key);

        // Compute a curve control point perpendicular to the edge —
        // organic, not Etch-a-Sketch
        const a = nodes[i], b = nodes[j];
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.hypot(dx, dy) || 1;
        const px = -dy / len;
        const py = dx / len;
        const offset = (Math.random() - 0.5) * len * 0.2;

        edges.push({
          a: i, b: j,
          cx: mx + px * offset,
          cy: my + py * offset
        });
      }
    });
  }

  function bezier(t, p0x, p0y, c1x, c1y, p2x, p2y) {
    const u = 1 - t;
    return {
      x: u*u*p0x + 2*u*t*c1x + t*t*p2x,
      y: u*u*p0y + 2*u*t*c1y + t*t*p2y
    };
  }

  function spawnPulse() {
    if (pulses.length >= 22 || edges.length === 0) return;
    const edge = edges[Math.floor(Math.random() * edges.length)];
    const direction = Math.random() < 0.5;
    pulses.push({
      edge,
      direction,
      t: 0,
      speed: 0.5 + Math.random() * 0.9,
      size: 2 + Math.random() * 2,
      color: nodes[direction ? edge.a : edge.b].color
    });
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    ctx.clearRect(0, 0, W, H);

    // Edges — soft baseline tint, low opacity so the network reads as
    // ambient rather than diagrammatic
    ctx.lineCap = 'round';
    ctx.lineWidth = 1;
    edges.forEach(e => {
      const a = nodes[e.a], b = nodes[e.b];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(e.cx, e.cy, b.x, b.y);
      ctx.strokeStyle = a.color;
      ctx.globalAlpha = 0.14;
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // Nodes — including their flash decay
    nodes.forEach(n => {
      n.flash = Math.max(0, n.flash - dt * 2.5);
      const flashBoost = n.flash;
      ctx.beginPath();
      ctx.arc(n.x, n.y, 2.5 + flashBoost * 3, 0, Math.PI * 2);
      ctx.fillStyle = n.color;
      ctx.globalAlpha = 0.32 + flashBoost * 0.65;
      if (flashBoost > 0.05) {
        ctx.shadowBlur = 16 * flashBoost;
        ctx.shadowColor = n.color;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.fill();
    });
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Pulses — update, draw, retire
    for (let i = pulses.length - 1; i >= 0; i--) {
      const p = pulses[i];
      p.t += p.speed * dt;

      if (p.t >= 1) {
        // Arrived — flash the destination node, retire the pulse
        const destIdx = p.direction ? p.edge.b : p.edge.a;
        nodes[destIdx].flash = 1;
        nodes[destIdx].color = p.color; // destination takes on the incoming color briefly
        pulses.splice(i, 1);
        continue;
      }

      const a = nodes[p.direction ? p.edge.a : p.edge.b];
      const b = nodes[p.direction ? p.edge.b : p.edge.a];
      const pt = bezier(p.t, a.x, a.y, p.edge.cx, p.edge.cy, b.x, b.y);

      // Sin-shaped opacity: fades in, peaks mid-travel, fades out
      const fade = Math.sin(p.t * Math.PI);

      ctx.globalAlpha = fade;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Spawn — high probability each frame, but capped at 22 pulses total
    if (Math.random() < 0.5) spawnPulse();

    if (!reduceMotion) requestAnimationFrame(frame);
  }

  function init() {
    resize();
    generateNetwork();
    if (reduceMotion) {
      // Static render: draw network once, no animation, no pulses
      ctx.clearRect(0, 0, W, H);
      ctx.lineCap = 'round';
      ctx.lineWidth = 1;
      edges.forEach(e => {
        const a = nodes[e.a], b = nodes[e.b];
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(e.cx, e.cy, b.x, b.y);
        ctx.strokeStyle = a.color;
        ctx.globalAlpha = 0.14;
        ctx.stroke();
      });
      ctx.globalAlpha = 1;
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.globalAlpha = 0.4;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      return;
    }
    requestAnimationFrame(frame);
  }

  // Debounce resize a bit so dragging a window doesn't thrash
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      resize();
      generateNetwork();
    }, 150);
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
