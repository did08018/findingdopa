/* --- Form controls ---
   Phone portrait (<600px): stack vertically, centered.
   Phone landscape and up (>=600px): horizontal row, centered.
   At 600px we have room for 200+200+110 widths plus gaps.
   font-size:16px prevents iOS auto-zoom on focus. */

.controls {
  text-align: center;
  margin: 20px 0 36px;
  padding: 0;
}

.controls > * {
  display: block;
  width: 100%;
  max-width: 340px;
  height: 48px;
  margin: 0 auto 14px;
  box-sizing: border-box;
  font-family: inherit;
  font-size: 16px;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}

.controls > *:last-child {
  margin-bottom: 0;
}

/* Search box (input + clear + search-icon) */
.search-container {
  position: relative;
}
.search-container input {
  width: 100%;
  height: 100%;
  padding: 0 90px 0 14px;
  border: 1px solid #ccc;
  border-radius: 10px;
  background: #fff;
  color: #333;
  font-family: inherit;
  font-size: 16px;
  box-sizing: border-box;
  -webkit-appearance: none;
  appearance: none;
}
.search-container input:focus {
  outline: 2px solid #EF9280;
  outline-offset: -1px;
  border-color: #EF9280;
}
.search-container button {
  position: absolute;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
  padding: 0;
  margin: 0;
  width: auto;
  max-width: none;
  height: auto;
}
.search-container button svg {
  display: block;
}
.search-container #clearBtn {
  right: 44px;
  width: 40px;
  background: transparent;
  color: #666;
  border-right: 1px solid #ddd;
  border-radius: 0;
}
.search-container #clearBtn:hover {
  background: #f5f5f5;
}
.search-container #searchBtn {
  right: 0;
  width: 44px;
  background: #EF9280;
  color: white;
  border-radius: 0 10px 10px 0;
}
.search-container #searchBtn:hover {
  background: #d87a6b;
}

/* Sort dropdown — custom chevron, native iOS appearance stripped */
#sortKey {
  padding: 0 40px 0 14px;
  border: 1px solid #ccc;
  border-radius: 10px;
  background-color: #fff;
  color: #333;
  cursor: pointer;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='%23666' d='M4 6l4 4 4-4z'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 14px;
}
#sortKey:focus {
  outline: 2px solid #EF9280;
  outline-offset: -1px;
  border-color: #EF9280;
}

/* Asc/Desc button */
#sortOrder {
  padding: 0 14px;
  background: #EF9280;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 500;
  text-align: center;
  line-height: 48px;
}
#sortOrder:hover {
  background: #d87a6b;
}

/* Phone landscape and up : switch to horizontal row */
@media (min-width: 600px) {
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
    text-align: initial;
  }
  .controls > * {
    display: inline-block;
    width: auto;
    max-width: none;
    margin: 0;
  }
  .search-container,
  #sortKey {
    width: 220px;
  }
  #sortOrder {
    width: 120px;
  }
}

/* Wider screens: a bit more breathing room */
@media (min-width: 900px) {
  .search-container,
  #sortKey {
    width: 240px;
  }
  #sortOrder {
    width: 130px;
  }
}

// DOM elements
const searchInput = document.getElementById('search');
const searchBtn = document.getElementById('searchBtn');
const clearBtn = document.getElementById('clearBtn');
const sortKey = document.getElementById('sortKey');
const sortOrderBtn = document.getElementById('sortOrder');
const tableBody = document.getElementById('treatmentsTable').querySelector('tbody');

// State
let currentSortKey = 'tentativeMarketDate';
let currentSortOrder = 'desc';
let currentSearch = '';

// Helper: extract a usable http(s) URL from a link field, or null if none.
// Handles empty strings, free-text descriptions, "url (parenthetical)",
// and markdown-style "[url](url)" patterns.
function extractUrl(s) {
  if (!s || typeof s !== 'string') return null;
  const match = s.match(/https?:\/\/[^\s\)\]]+/);
  return match ? match[0] : null;
}

// Helper: escape attribute values to keep stray quotes from breaking HTML.
function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// Helper: Parse market date for sorting.
// Returns { year, indefinite }.
//   - indefinite: true means push to bottom in BOTH sort directions.
//   - year: a 4-digit year extracted from the first line, used to sort.
// Convention for the data file: the first line of tentativeMarketDate should
// either start with "Marketed YYYY" / contain a year, or with a clear
// indefinite keyword (Unknown, Discontinued, Withdrawn, Supplement, N/A).
function parseMarketDate(val) {
  if (!val) return { year: null, indefinite: true };
  const firstLine = val.split('\n')[0].trim();

  // Indefinite / negative — pushed to bottom regardless of sort direction
  if (/^(unknown|unlikely|discontinued|withdrawn|n\/a|not (established|applicable)|tbd|multi[-\s]year|procedure[-\s]based|supplement|existing products)/i.test(firstLine)) {
    return { year: null, indefinite: true };
  }

  // Find first 4-digit year anywhere in the first line
  const m = firstLine.match(/(\d{4})/);
  if (m) return { year: parseInt(m[1], 10), indefinite: false };

  // Marketed/Available with no year — treat as indefinite so it doesn't
  // unpredictably anchor either end of the sort
  return { year: null, indefinite: true };
}

// Comparator: indefinite always at bottom; otherwise compare by year.
function compareMarketDate(a, b, desc) {
  const aD = parseMarketDate(a);
  const bD = parseMarketDate(b);
  if (aD.indefinite && !bD.indefinite) return 1;
  if (!aD.indefinite && bD.indefinite) return -1;
  if (aD.indefinite && bD.indefinite) return 0;
  return desc ? bD.year - aD.year : aD.year - bD.year;
}

// Render table
function renderTable() {
  let filtered = treatments.filter(t =>
    t.name.toLowerCase().includes(currentSearch.toLowerCase())
  );

  filtered.sort((a, b) => {
    if (currentSortKey === 'tentativeMarketDate') {
      return compareMarketDate(a.tentativeMarketDate, b.tentativeMarketDate, currentSortOrder === 'desc');
    }
    return currentSortOrder === 'desc'
      ? String(b[currentSortKey]).localeCompare(String(a[currentSortKey]))
      : String(a[currentSortKey]).localeCompare(String(b[currentSortKey]));
  });

  tableBody.innerHTML = '';
  const total = filtered.length;

  filtered.forEach((t, index) => {
    const reverseIndex = total - index;
    const url = extractUrl(t.link);
    const linkCell = url
      ? `<a href="${escAttr(url)}" target="_blank" rel="noopener noreferrer">Link</a>`
      : `<span class="no-link">&mdash;</span>`;

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${reverseIndex}</td>
      <td>${t.name}</td>
      <td>${t.tentativeMarketDate}</td>
      <td>${t.administration}</td>
      <td>${t.goal}</td>
      <td>${t.trialPhase}</td>
      <td>${linkCell}</td>
    `;
    tableBody.appendChild(row);
  });

  sortOrderBtn.innerHTML = currentSortOrder === 'desc' ? '&#x2193; Desc' : '&#x2191; Asc';
}

function updateSearch() {
  currentSearch = searchInput.value;
  clearBtn.style.display = searchInput.value ? 'flex' : 'none';
  renderTable();
}

searchInput.addEventListener('input', updateSearch);
searchBtn.addEventListener('click', updateSearch);

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  currentSearch = '';
  clearBtn.style.display = 'none';
  renderTable();
});

sortKey.addEventListener('change', e => {
  currentSortKey = e.target.value;
  renderTable();
});

sortOrderBtn.addEventListener('click', () => {
  currentSortOrder = currentSortOrder === 'desc' ? 'asc' : 'desc';
  renderTable();
});

// Sync UI to default state
sortKey.value = currentSortKey;
sortOrderBtn.innerHTML = currentSortOrder === 'desc' ? '&#x2193; Desc' : '&#x2191; Asc';
renderTable();
</script>
